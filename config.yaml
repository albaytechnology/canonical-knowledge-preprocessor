# Canonical Knowledge Document (CKD) Configuration File

input_dir: "./IK-YEDEK"
output_dir: "./Files"
parallel_workers: 1
resume_from_manifest: true
cache_enabled: true

llm:
  provider: "ollama" # Options: ollama, openai, mock
  model_name: "qwen3.6:35b"
  api_base: "http://172.16.10.142:11434"
  api_key: null
  temperature: 0.0
  max_tokens: 4096
  timeout: 0
  max_retries: 3

chunking:
  target_tokens: 3000
  overlap_tokens: 300
  tokenizer_type: "word" # Options: word, tiktoken
  respect_headings: true
  respect_tables: true
  respect_code_blocks: true

parser:
  enable_ocr: true
  ocr_language: "eng+tur"
  max_file_size_mb: 100
  supported_extensions:
    - pdf
    - docx
    - doc
    - xlsx
    - xls
    - csv
    - txt
    - md
    - html
    - htm
    - eml
    - msg
    - pptx
    - ppt
    - xml
    - json
    - log
    - png
    - jpg
    - jpeg
